<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marcompany Universal</title>
    
    <link rel="apple-touch-icon" href="icono.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Marcompany">

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --prot: #3498db; --carb: #f1c40f; --gras: #e67e22; --white: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); padding: 10px; color: var(--primary); margin: 0; }
        .container { max-width: 800px; margin: auto; background: var(--white); padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; border-bottom: 3px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; font-size: 1.4rem; }
        .form-grid { display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 12px; position: relative; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-add { background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; padding: 15px; font-size: 1rem; }
        #lista-busqueda { position: absolute; top: 60px; left: 15px; background: white; border: 1px solid #ccc; width: calc(100% - 30px); max-height: 200px; overflow-y: auto; display: none; z-index: 100; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .sug-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; text-transform: uppercase; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th { background: #f2f2f2; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .resumen { margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .card { padding: 12px; border-radius: 10px; text-align: center; color: white; font-size: 0.8rem; }
        .c-kcal { background: var(--primary); grid-column: span 3; font-size: 1.3rem; font-weight: bold; }
        .c-prot { background: var(--prot); } .c-carb { background: var(--carb); color: #333; } .c-gras { background: var(--gras); }
    </style>
</head>
<body>

<div class="container">
    <h1>Marcompany Universal</h1>
    
    <div class="form-grid">
        <input type="text" id="nombre" placeholder="Escribe alimento..." oninput="buscarSugerencia()" autocomplete="off">
        <div id="lista-busqueda"></div>
        
        <div style="display: flex; gap: 5px;">
            <input type="number" id="peso" placeholder="Cant.">
            <select id="unidad" style="width: 80px;">
                <option value="g">g</option>
                <option value="mg">mg</option>
            </select>
        </div>
        <button class="btn-add" onclick="agregar()">AÑADIR AHORA</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Cant.</th>
                <th>Kcal</th>
                <th>P/C/G</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="cuerpo"></tbody>
    </table>

    <div class="resumen">
        <div class="card c-kcal">TOTAL: <span id="r-kcal">0</span> kcal</div>
        <div class="card c-prot">P: <span id="r-p">0</span>g</div>
        <div class="card c-carb">C: <span id="r-c">0</span>g</div>
        <div class="card c-gras">G: <span id="r-g">0</span>g</div>
    </div>
</div>

<script>
    const db = {
        "pollo": { k: 165, p: 31, c: 0, g: 3.6 },
        "pavo": { k: 105, p: 24, c: 0, g: 1 },
        "atun": { k: 116, p: 26, c: 0, g: 1 },
        "salmon": { k: 208, p: 20, c: 0, g: 13 },
        "borraja": { k: 21, p: 1.8, c: 3, g: 0.7 },
        "judias verdes": { k: 31, p: 1.8, c: 7, g: 0.2 },
        "judias blancas": { k: 333, p: 23, c: 60, g: 0.8 },
        "nueces": { k: 654, p: 15, c: 14, g: 65 },
        "anacardos": { k: 553, p: 18, c: 30, g: 44 },
        "donut": { k: 450, p: 5, c: 50, g: 25 },
        "naranja": { k: 47, p: 0.9, c: 12, g: 0.1 }
    };

    let lista = [];

    function buscarSugerencia() {
        const input = document.getElementById('nombre').value.toLowerCase();
        const div = document.getElementById('lista-busqueda');
        if (input.length < 1) { div.style.display = 'none'; return; }
        
        const sugerencias = Object.keys(db).filter(f => f.includes(input));
        div.innerHTML = sugerencias.map(s => `<div class="sug-item" onclick="seleccionar('${s}')">${s}</div>`).join('');
        div.style.display = sugerencias.length > 0 ? 'block' : 'none';
    }

    function seleccionar(val) {
        document.getElementById('nombre').value = val;
        document.getElementById('lista-busqueda').style.display = 'none';
    }

    function agregar() {
        const n = document.getElementById('nombre').value.toLowerCase().trim();
        const cant = parseFloat(document.getElementById('peso').value);
        const uni = document.getElementById('unidad').value;
        
        if (!db[n] || isNaN(cant)) {
            alert("Selecciona un alimento de la lista y pon una cantidad válida.");
            return;
        }

        let pesoG = (uni === "mg") ? cant / 1000 : cant;
        const info = db[n];
        const factor = pesoG / 100;
        
        lista.push({
            n: n,
            displayPeso: cant + uni,
            k: info.k * factor,
            p: info.p * factor,
            c: info.c * factor,
            g: info.g * factor
        });
        
        actualizar();
        document.getElementById('nombre').value = '';
        document.getElementById('peso').value = '';
    }

    function actualizar() {
        const cuerpo = document.getElementById('cuerpo');
        cuerpo.innerHTML = '';
        let tk=0, tp=0, tc=0, tg=0;
        
        lista.forEach((item, index) => {
            tk += item.k; tp += item.p; tc += item.c; tg += item.g;
            cuerpo.innerHTML += `<tr>
                <td>${item.n.toUpperCase()}</td>
                <td>${item.displayPeso}</td>
                <td>${item.k.toFixed(0)}</td>
                <td>${item.p.toFixed(1)}/${item.c.toFixed(1)}/${item.g.toFixed(1)}</td>
                <td><button onclick="eliminar(${index})" style="color:red; border:none; background:none; font-size:1.2rem;">✕</button></td>
            </tr>`;
        });
        
        document.getElementById('r-kcal').innerText = tk.toFixed(0);
        document.getElementById('r-p').innerText = tp.toFixed(1);
        document.getElementById('r-c').innerText = tc.toFixed(1);
        document.getElementById('r-g').innerText = tg.toFixed(1);
    }

    function eliminar(index) {
        lista.splice(index, 1);
        actualizar();
    }
</script>

</body>
</html>
