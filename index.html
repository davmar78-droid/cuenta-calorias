<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcompany Universal Total</title>
    
    <link rel="apple-touch-icon" href="icono.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Marcompany">

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --prot: #3498db; --carb: #f1c40f; --gras: #e67e22; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--primary); margin: 0; }
        .container { max-width: 950px; margin: auto; background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; border-bottom: 4px solid var(--accent); padding-bottom: 10px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 20px; border-radius: 12px; position: relative; align-items: end; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .btn-add { background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; height: 48px; font-size: 1rem; transition: 0.3s; }
        .btn-add:hover { background: #219150; }
        #lista-busqueda { position: absolute; top: 85px; left: 20px; background: white; border: 1px solid #ccc; width: 35%; max-height: 250px; overflow-y: auto; display: none; z-index: 100; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .sug-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9rem; text-transform: uppercase; }
        .sug-item:hover { background: #f0f0f0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f2f2f2; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 0.75rem; color: white; font-weight: bold; display: inline-block; }
        .bg-prot { background: var(--prot); } .bg-carb { background: var(--carb); color: #333; } .bg-gras { background: var(--gras); }
        .resumen { margin-top: 30px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .card { padding: 20px; border-radius: 12px; text-align: center; color: white; }
        .c-kcal { background: var(--primary); grid-column: span 4; font-size: 1.8rem; font-weight: bold; }
        .c-prot { background: var(--prot); } .c-carb { background: var(--carb); color: #333; } .c-gras { background: var(--gras); }
    </style>
</head>
<body>

<div class="container">
    <h1>Marcompany Universal Total</h1>
    
    <div class="form-grid">
        <div>
            <label><strong>Alimento</strong></label>
            <input type="text" id="nombre" placeholder="Donut, borraja..." oninput="buscarSugerencia()" autocomplete="off">
            <div id="lista-busqueda"></div>
        </div>
        <div>
            <label><strong>Cantidad</strong></label>
            <input type="number" id="peso" placeholder="Nº">
        </div>
        <div>
            <label><strong>Unidad</strong></label>
            <select id="unidad">
                <option value="g">Gramos (g)</option>
                <option value="mg">Miligramos (mg)</option>
            </select>
        </div>
        <button class="btn-add" onclick="agregar()">AÑADIR</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Alimento</th>
                <th>Tipo</th>
                <th>Peso Real</th>
                <th>Kcal</th>
                <th>P / C / G</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="cuerpo"></tbody>
    </table>

    <div class="resumen">
        <div class="card c-kcal">TOTAL: <span id="r-kcal">0</span> kcal</div>
        <div class="card c-prot">Proteína<br><span id="r-p">0</span>g</div>
        <div class="card c-carb">Carbos<br><span id="r-c">0</span>g</div>
        <div class="card c-gras">Grasa<br><span id="r-g">0</span>g</div>
    </div>
</div>
